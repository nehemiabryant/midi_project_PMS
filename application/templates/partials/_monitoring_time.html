<div class="card bg-dark text-white shadow-sm mb-4">
    <div class="card-header text-center border-bottom-0 pt-3">
        Status Time
    </div>
    <div class="card-body">
        <div class="row text-center">
            <div class="col-4">
                <h6 class="text-muted mb-1">Complete</h6>
                <h3 class="fw-bold text-success">{{ chart_data.complete }}</h3>
            </div>
            <div class="col-4">
                <h6 class="text-muted mb-1">On Time</h6>
                <h3 class="fw-bold text-info">{{ chart_data.on_time }}</h3>
            </div>
            <div class="col-4">
                <h6 class="text-muted mb-1">Over</h6>
                <h3 class="fw-bold text-danger">{{ chart_data.over }}</h3>
            </div>
        </div>
    </div>
</div>
