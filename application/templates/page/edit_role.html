{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/csspms/edit_role.css') }}" />
{% endblock %}

{% block content %}
{% with header_title='Edit Detail Role' %}
{% include 'components/header.html' %}
{% endwith %}

<div class="card-container">

    <!-- BACK BUTTON -->
    <div class="top-action">
        <a href="{{ url_for('role_mgmt.master_role_menu') }}" class="btn-back">
            <i class="fas fa-chevron-left"></i> Kembali
        </a>
    </div>

    <!-- FORM START -->
    <form method="POST" action="{{ url_for('role_mgmt.master_role_edit', approle_id=role.approle_id) }}">

        <!-- ROLE NAME -->
        <div class="form-row">
            <div class="form-label">Nama Role</div>
            <div class="form-field">
                <input type="text"
                       class="form-input"
                       name="approle_name"
                       value="{{ role.approle_name }}"
                       required />
            </div>
        </div>

        <div class="form-content">

            <!-- CHECK ALL -->
            <div class="check-all-container">
                <label class="custom-checkbox-wrapper font-semibold">
                    <input type="checkbox" id="checkAll">
                    <span class="checkmark"></span>
                    <span class="checkbox-label">Checklist Semua Menu</span>
                </label>
            </div>

            <!-- PERMISSIONS -->
            <div class="role-section">
                <h3 class="section-title">Permissions</h3>

                <div class="checkbox-grid">
                    {% for perm in permissions %}
                    <label class="custom-checkbox-wrapper">

                        <input type="checkbox"
                               class="menu-checkbox"
                               name="permission_ids"
                               value="{{ perm.permission_id }}"
                               {% if perm.permission_id in role_permissions | map(attribute='permission_id') | list %}checked{% endif %}>

                        <span class="checkmark"></span>
                        <span class="checkbox-label">
                            {{ perm.permission_detail }}
                        </span>

                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- SAVE BUTTON -->
            <div class="bottom-action">
                <button type="submit" class="btn-save">
                    <i class="fas fa-save"></i> Simpan
                </button>
            </div>

        </div>
    </form>
    <!-- FORM END -->

</div>

<!-- SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', function () {

    const checkAllBtn = document.getElementById('checkAll');
    const menuCheckboxes = document.querySelectorAll('.menu-checkbox');

    // CHECK ALL
    checkAllBtn.addEventListener('change', function () {
        menuCheckboxes.forEach(function (checkbox) {
            checkbox.checked = checkAllBtn.checked;
        });
    });

    // AUTO UPDATE CHECK ALL STATUS
    menuCheckboxes.forEach(function (checkbox) {
        checkbox.addEventListener('change', function () {
            if (!this.checked) {
                checkAllBtn.checked = false;
            } else {
                const allChecked = Array.from(menuCheckboxes).every(c => c.checked);
                checkAllBtn.checked = allChecked;
            }
        });
    });

});
</script>

{% endblock %}
