{% extends 'base.html' %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/csspms/monitoring_by_sr.css') }}" />

<style>
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes sectionFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}
.section-spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.section-loaded { animation: sectionFadeIn 0.4s ease forwards; }
</style>

<div class="container-fluid mt-4">
    <h2 class="page-title">Monitoring by SR</h2>

    <div class="filter-section">
        <div class="card bg-dark text-white mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <label class="form-label text-muted small">Pilih Tahun</label>
                        <select id="year" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Tahun</option>
                            {% for y in years %}
                                <option value="{{ y.filter_year }}">{{ y.filter_year }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Pilih Quarter</label>
                        <select id="q_id" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Quarter</option>
                            {% for q in quarters %}
                                <option value="{{ q.q_id }}">{{ q.quarter }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Pilih Tipe</label>
                        <select id="ctg_id" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Tipe</option>
                            {% for c in categories %}
                                <option value="{{ c.ctg_id }}">{{ c.category }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Pilih Departemen</label>
                        <select id="dept_id" class="form-select bg-secondary text-white border-0" onchange="toggleMidikriing(this)">
                            <option value="">Semua Departemen</option>
                            {% for d in departments %}
                                <option value="{{ d.id_dept }}">{{ d.department_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2" id="midikriingWrapper" style="display:none;">
                        <label class="form-label text-muted small">Status Midikriing</label>
                        <select id="midikriing" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Status</option>
                            <option value="true">Ya</option>
                            <option value="false">Tidak</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button onclick="triggerSearch()" class="btn btn-primary w-100">
                            <i class="fas fa-search me-2"></i> View
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainContentWrapper" style="width: 100%;">

        <div id="defaultPlaceholder" style="
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 380px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            padding: 48px 24px;
            margin-top: 25px;
        ">
            <i class="fas fa-chart-bar" style="font-size: 52px; color: #e2e8f0; margin-bottom: 20px;"></i>
            <h5 style="color: #64748b; font-weight: 700; margin-bottom: 8px;">Belum Ada Data Monitoring</h5>
            <p style="color: #94a3b8; font-size: 14px; margin: 0;">Sesuaikan filter di atas dan klik <strong>View</strong> untuk mulai.</p>
        </div>

        <div id="monitoringResults" style="display: none;">

            <!-- Cards: 4 kotak spinner -->
            <div id="cards-container" class="mb-4">
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;margin-bottom:24px;">
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;min-height:110px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;min-height:110px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;min-height:110px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;min-height:110px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                </div>
            </div>

            <!-- Charts: 2 kotak spinner -->
            <div id="overview-chart-container" style="margin-bottom:24px;">
                <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;min-height:380px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;min-height:380px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                </div>
            </div>

            <!-- Overdue & Completed Tables: 2 kotak spinner -->
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px;">
                <div id="overdue-table-container">
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;height:440px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                </div>
                <div id="completed-table-container">
                    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;height:440px;display:flex;align-items:center;justify-content:center;"><div class="section-spinner"></div></div>
                </div>
            </div>

            <!-- All Projects Table: 1 kotak spinner lebar -->
            <div id="all-table-container">
                <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;"><div class="section-spinner"></div></div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard_orchestrator.js') }}"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const saved = sessionStorage.getItem('monitoring_filters');
    if (!saved) return;

    const f = JSON.parse(saved);
    document.getElementById('year').value       = f.year       || '';
    document.getElementById('q_id').value       = f.q_id       || '';
    document.getElementById('ctg_id').value     = f.ctg_id     || '';
    document.getElementById('dept_id').value    = f.dept_id    || '';
    document.getElementById('midikriing').value = f.midikriing || '';

    if (f.dept_id === '2') {
        document.getElementById('midikriingWrapper').style.display = '';
    }

    triggerSearch();
});

function toggleMidikriing(select) {
    const show = select.value === '2';
    const wrapper = document.getElementById('midikriingWrapper');
    wrapper.style.display = show ? '' : 'none';
    if (!show) document.getElementById('midikriing').value = '';
}

function searchTable() {
    let input = document.getElementById("searchAllProjects");
    if (!input) return;
    let filter = input.value.toLowerCase();
    let table = document.getElementById("allProjectsTable");
    if (!table) return;
    let tbody = table.getElementsByTagName("tbody")[0];
    let rows = tbody.getElementsByTagName("tr");
    for (let i = 0; i < rows.length; i++) {
        if (rows[i].getElementsByTagName("td").length === 1) continue;
        rows[i].style.display = rows[i].textContent.toLowerCase().includes(filter) ? "" : "none";
    }
}
</script>

{% endblock %}
