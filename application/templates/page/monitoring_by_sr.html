{% extends 'base.html' %} 
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/csspms/monitoring_by_sr.css') }}" />

<div class="container-fluid mt-4">
    <h2 class="page-title">Monitoring by SR</h2>

    <div class="filter-section">
        <div class="card bg-dark text-white mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <label class="form-label text-muted small">Tahun</label>
                        <select id="year" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Tahun</option>
                            {% for y in years %}
                                <option value="{{ y.filter_year }}">{{ y.filter_year }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Quarter</label>
                        <select id="q_id" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Quarter</option>
                            {% for q in quarters %}
                                <option value="{{ q.q_id }}">{{ q.quarter }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Tipe</label>
                        <select id="ctg_id" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Tipe</option>
                            {% for c in categories %}
                                <option value="{{ c.ctg_id }}">{{ c.category }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Departemen</label>
                        <select id="dept_id" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Departemen</option>
                            {% for d in departments %}
                                <option value="{{ d.dept_id }}">{{ d.department_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label text-muted small">Status Midikriing</label>
                        <select id="midikriing" class="form-select bg-secondary text-white border-0">
                            <option value="">Semua Status</option>
                            <option value="true">Ya</option>
                            <option value="false">Tidak</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button onclick="triggerSearch()" class="btn btn-primary w-100">
                            <i class="fas fa-search me-2"></i> View
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainContentWrapper" style="position: relative; min-height: 400px; width: 100%;">
        
        <div id="contentLoading" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.8); z-index: 100; justify-content: center; align-items: center; flex-direction: column; border-radius: 12px; backdrop-filter: blur(3px);">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h6 class="mt-3" style="color: #475569; font-weight: 600;">Memperbarui data...</h6>
        </div>

        <div id="defaultPlaceholder" class="card shadow-sm mb-4" style="border-radius: 12px; border: 1px solid #e2e8f0; background-color: #ffffff; min-height: 400px; display: flex; justify-content: center; align-items: center; text-align: center;">
            <div>
                <i class="fas fa-chart-pie mb-3" style="font-size: 56px; color: #cbd5e1;"></i>
                <h4 style="color: #475569; font-weight: 700;">Belum Ada Data Monitoring</h4>
                <p style="color: #94a3b8; font-size: 15px;">Silakan sesuaikan filter dan klik tombol <strong>"View"</strong>.</p>
            </div>
        </div>

        <div id="monitoringResults" style="display: none;">
            
            <div id="cards-container" class="mb-4"></div>

            <div style="width: 100%; margin-bottom: 24px;">
                <div id="time-chart-container" style="display: none;"></div> 
                <div id="overview-chart-container" style="width: 100%;"></div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; width: 100%;">
                <div id="overdue-table-container"></div>
                <div id="completed-table-container"></div>
            </div>

            <div id="all-table-container"></div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard_orchestrator.js') }}"></script>

<div class="row">
        <div class="col-12" id="all-table-container"></div>
    </div>

</div> <script src="{{ url_for('static', filename='js/dashboard_orchestrator.js') }}"></script>

<script>
function searchTable() {
    let input = document.getElementById("searchAllProjects");
    if (!input) return; 
    
    let filter = input.value.toLowerCase();
    
    let table = document.getElementById("allProjectsTable");
    if (!table) return;

    let tbody = table.getElementsByTagName("tbody")[0];
    let rows = tbody.getElementsByTagName("tr");

    for (let i = 0; i < rows.length; i++) {
        let cells = rows[i].getElementsByTagName("td");
        if (cells.length === 1) continue; 

        let rowText = rows[i].textContent || rows[i].innerText;

        if (rowText.toLowerCase().indexOf(filter) > -1) {
            rows[i].style.display = "";
        } else {
            rows[i].style.display = "none";
        }
    }
}
</script>

{% endblock %}
